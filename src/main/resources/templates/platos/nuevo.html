<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo plato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:560px">
    <h1 class="h3 mb-1">Nuevo plato</h1>
    <p class="text-muted mb-4">en <strong th:text="${restaurante.nombre}"></strong></p>
    <div class="card">
        <div class="card-body">
            <form th:action="@{/web/restaurantes/{restauranteId}/platos/nuevo(restauranteId=${restaurante.id})}"
                        th:object="${plato}" method="post">
                <div class="mb-3">
                    <label class="form-label form-label-sm">Nombre *</label>
                    <input type="text" th:field="*{nombre}" class="form-control form-control-sm" required>
                </div>
                <div class="mb-3">
                    <label class="form-label form-label-sm">Descripción</label>
                    <textarea th:field="*{descripcion}" class="form-control form-control-sm" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label form-label-sm">Precio (€)</label>
                    <input type="number" th:field="*{precio}" class="form-control form-control-sm"
                           step="0.01" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label form-label-sm">Categoría</label>
                    <select th:field="*{categoria}" class="form-select form-select-sm">
                        <option value="entrante">Entrante</option>
                        <option value="principal">Principal</option>
                        <option value="postre">Postre</option>
                        <option value="bebida">Bebida</option>
                    </select>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" th:field="*{vegetariano}" class="form-check-input" id="vegCheck">
                    <label class="form-check-label" for="vegCheck">Plato vegetariano</label>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-sm">Guardar plato</button>
                    <a th:href="@{/web/restaurantes/{id}(id=${restaurante.id})}"
                       class="btn btn-outline-secondary btn-sm">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
