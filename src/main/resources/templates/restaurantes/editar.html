<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar restaurante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:560px">
    <h1 class="h3 mb-4">Editar restaurante</h1>
    <div class="card">
        <div class="card-body">
            <form th:action="@{/web/restaurantes/editar/{id}(id=${restaurante.id})}"
                  th:object="${restaurante}" method="post">
                <div class="mb-3">
                    <label class="form-label form-label-sm">Nombre *</label>
                    <input type="text" th:field="*{nombre}" class="form-control form-control-sm" required>
                </div>
                <div class="mb-3">
                    <label class="form-label form-label-sm">Ciudad</label>
                    <input type="text" th:field="*{ciudad}" class="form-control form-control-sm">
                </div>
                <div class="mb-3">
                    <label class="form-label form-label-sm">Tipo de cocina</label>
                    <input type="text" th:field="*{tipo}" class="form-control form-control-sm">
                </div>
                <div class="mb-3">
                    <label class="form-label form-label-sm">Estrellas Michelin (0–3)</label>
                    <input type="number" th:field="*{estrellas}" class="form-control form-control-sm"
                           min="0" max="3">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning btn-sm">Guardar cambios</button>
                    <a th:href="@{/web/restaurantes}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
