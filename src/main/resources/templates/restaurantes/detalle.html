<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${restaurante.nombre}">Detalle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

    <!-- Info del restaurante -->
    <div class="card mb-4">
        <div class="card-body">
            <h2 class="h4" th:text="${restaurante.nombre}"></h2>
            <div class="row g-2 text-muted small">
                <div class="col-auto">📍 <span th:text="${restaurante.ciudad}"></span></div>
                <div class="col-auto">🍴 <span th:text="${restaurante.tipo}"></span></div>
                <div class="col-auto">⭐ <span th:text="${restaurante.estrellas}"></span> estrellas Michelin</div>
                <div class="col-auto">💶 Precio medio del menú:
                    <strong th:text="${#numbers.formatDecimal(precioMedio, 1, 2)} + ' €'"></strong>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <a th:href="@{/web/restaurantes/editar/{id}(id=${restaurante.id})}"
                   class="btn btn-warning btn-sm">Editar restaurante</a>
                <a th:href="@{/web/restaurantes}" class="btn btn-outline-secondary btn-sm">← Volver</a>
            </div>
        </div>
    </div>

    <!-- Cabecera platos + filtro categoría -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="h5 mb-0">Platos</h3>
        <a th:href="@{/web/restaurantes/{id}/platos/nuevo(id=${restaurante.id})}"
           class="btn btn-primary btn-sm">+ Añadir plato</a>
    </div>

    <div class="card mb-3">
        <div class="card-body py-2">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-auto">
                    <label class="form-label form-label-sm mb-0">Categoría</label>
                    <select name="categoria" class="form-select form-select-sm">
                        <option value="">Todas</option>
                        <option value="entrante"  th:selected="${categoriaFiltro == 'entrante'}">Entrante</option>
                        <option value="principal" th:selected="${categoriaFiltro == 'principal'}">Principal</option>
                        <option value="postre"    th:selected="${categoriaFiltro == 'postre'}">Postre</option>
                        <option value="bebida"    th:selected="${categoriaFiltro == 'bebida'}">Bebida</option>
                    </select>
                </div>
                <div class="col-auto d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-sm">Filtrar</button>
                    <a th:href="@{/web/restaurantes/{id}(id=${restaurante.id})}"
                       class="btn btn-outline-secondary btn-sm">Limpiar</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabla de platos -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th><th>Descripción</th><th>Precio</th>
                        <th>Categoría</th><th>Vegetariano</th><th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(platos)}">
                        <td colspan="6" class="text-center text-muted py-3">No hay platos en esta categoría.</td>
                    </tr>
                    <tr th:each="p : ${platos}">
                        <td th:text="${p.nombre}"></td>
                        <td th:text="${p.descripcion}"></td>
                        <td th:text="${p.precio} + ' €'"></td>
                        <td><span class="badge bg-secondary" th:text="${p.categoria}"></span></td>
                        <td th:text="${p.vegetariano} ? '🌿 Sí' : 'No'"></td>
                        <td>
                            <a th:href="@{/web/restaurantes/platos/editar/{id}(id=${p.id})}"
                               class="btn btn-warning btn-sm me-1">Editar</a>
                            <form th:action="@{/web/restaurantes/platos/borrar/{id}(id=${p.id})}"
                                  method="post" style="display:inline"
                                  onsubmit="return confirm('¿Borrar este plato?')">
                                <button type="submit" class="btn btn-danger btn-sm">Borrar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
