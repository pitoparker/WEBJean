<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Restaurantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">🍽️ Restaurantes</h1>
        <a th:href="@{/web/restaurantes/nueva}" class="btn btn-primary btn-sm">+ Nuevo restaurante</a>
    </div>

    <!-- Filtro por tipo de cocina -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" th:action="@{/web/restaurantes}" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label form-label-sm">Tipo de cocina</label>
                    <input type="text" name="tipo" class="form-control form-control-sm"
                           placeholder="italiano, español..." th:value="${tipo}">
                </div>
                <div class="col-md-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-sm">Filtrar</button>
                    <a th:href="@{/web/restaurantes}" class="btn btn-outline-secondary btn-sm">Limpiar</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabla -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th><th>Nombre</th><th>Ciudad</th>
                        <th>Tipo</th><th>Estrellas</th><th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(restaurantes)}">
                        <td colspan="6" class="text-center text-muted py-3">No se encontraron restaurantes.</td>
                    </tr>
                    <tr th:each="r : ${restaurantes}">
                        <td th:text="${r.id}"></td>
                        <td th:text="${r.nombre}"></td>
                        <td th:text="${r.ciudad}"></td>
                        <td th:text="${r.tipo}"></td>
                        <td th:text="${r.estrellas} + ' ⭐'"></td>
                        <td>
                            <a th:href="@{/web/restaurantes/{id}(id=${r.id})}"
                               class="btn btn-info btn-sm me-1">Ver platos</a>
                            <a th:href="@{/web/restaurantes/editar/{id}(id=${r.id})}"
                               class="btn btn-warning btn-sm me-1">Editar</a>
                            <form th:action="@{/web/restaurantes/borrar/{id}(id=${r.id})}"
                                  method="post" style="display:inline"
                                  onsubmit="return confirm('¿Borrar este restaurante y todos sus platos?')">
                                <button type="submit" class="btn btn-danger btn-sm">Borrar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
