<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Persona</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 540px">

    <h1 class="h4 mb-4">Nueva persona</h1>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/web/nueva}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="name" class="form-control" required placeholder="Nombre completo">
                </div>
                <div class="mb-3">
                    <label class="form-label">Fecha de nacimiento</label>
                    <input type="date" name="birthDate" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select name="rol" class="form-select" required>
                        <option value="">Selecciona un rol</option>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Clase</label>
                    <input type="text" name="classroom" class="form-control" required placeholder="Ej: 2DAW">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Crear persona</button>
                    <a th:href="@{/web}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
