<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Buscar por fechas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h4">Buscar por rango de fechas de nacimiento</h1>
        <a th:href="@{/web}" class="btn btn-outline-secondary btn-sm">← Volver al listado</a>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form method="get" th:action="@{/web/fechas}" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label form-label-sm">Desde</label>
                    <input type="date" name="inicio" class="form-control form-control-sm" required
                           th:value="${inicio}">
                </div>
                <div class="col-md-4">
                    <label class="form-label form-label-sm">Hasta</label>
                    <input type="date" name="fin" class="form-control form-control-sm" required
                           th:value="${fin}">
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary btn-sm">Buscar</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${personas != null}">
        <p class="text-muted" th:text="'Resultados: ' + ${#lists.size(personas)} + ' persona(s)'"></p>
        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Fecha de nacimiento</th>
                            <th>Rol</th>
                            <th>Clase</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(personas)}">
                            <td colspan="5" class="text-center text-muted py-3">
                                Ninguna persona en ese rango de fechas.
                            </td>
                        </tr>
                        <tr th:each="p : ${personas}">
                            <td th:text="${p.id}"></td>
                            <td th:text="${p.name}"></td>
                            <td th:text="${#temporals.format(p.birthDate, 'dd/MM/yyyy')}"></td>
                            <td><span class="badge bg-secondary" th:text="${p.rol}"></span></td>
                            <td th:text="${p.classroom}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
