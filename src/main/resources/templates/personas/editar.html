<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Clase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 540px">

    <h1 class="h4 mb-4">Editar clase</h1>

    <div class="card" th:if="${persona != null}">
        <div class="card-body">
            <dl class="row mb-3">
                <dt class="col-sm-4">Nombre</dt>
                <dd class="col-sm-8" th:text="${persona.name}"></dd>
                <dt class="col-sm-4">Rol</dt>
                <dd class="col-sm-8"><span class="badge bg-secondary" th:text="${persona.rol}"></span></dd>
                <dt class="col-sm-4">Clase actual</dt>
                <dd class="col-sm-8" th:text="${persona.classroom}"></dd>
            </dl>

            <form th:action="@{/web/editar/{id}(id=${persona.id})}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nueva clase</label>
                    <input type="text" name="classroom" class="form-control" required
                           th:value="${persona.classroom}" placeholder="Ej: 2DAW">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning">Guardar cambio</button>
                    <a th:href="@{/web}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <div class="alert alert-warning" th:if="${persona == null}">
        No se encontró la persona indicada. <a th:href="@{/web}">Volver al listado</a>
    </div>

</div>
</body>
</html>
