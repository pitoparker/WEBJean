<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Personas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">Personas</h1>
        <div>
            <a th:href="@{/web/nueva}" class="btn btn-primary btn-sm me-2">+ Nueva persona</a>
            <a th:href="@{/web/fechas}" class="btn btn-outline-secondary btn-sm">Buscar por fechas</a>
        </div>
    </div>

    <!-- Filtros -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" th:action="@{/web}" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label form-label-sm">Nombre</label>
                    <input type="text" name="name" class="form-control form-control-sm"
                           placeholder="Empieza por..." th:value="${name}">
                </div>
                <div class="col-md-3">
                    <label class="form-label form-label-sm">Rol</label>
                    <select name="rol" class="form-select form-select-sm">
                        <option value="">Todos</option>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"
                                th:selected="${r.name() == rol}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label form-label-sm">Clase</label>
                    <input type="text" name="classroom" class="form-control form-control-sm"
                           placeholder="Clase..." th:value="${classroom}">
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-sm">Filtrar</button>
                    <a th:href="@{/web}" class="btn btn-outline-secondary btn-sm">Limpiar</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabla -->
    <div class="card mb-4">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Fecha de nacimiento</th>
                        <th>Rol</th>
                        <th>Clase</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(personas)}">
                        <td colspan="6" class="text-center text-muted py-3">No se encontraron personas.</td>
                    </tr>
                    <tr th:each="p : ${personas}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.name}"></td>
                        <td th:text="${#temporals.format(p.birthDate, 'dd/MM/yyyy')}"></td>
                        <td><span class="badge bg-secondary" th:text="${p.rol}"></span></td>
                        <td th:text="${p.classroom}"></td>
                        <td>
                            <a th:href="@{/web/editar/{id}(id=${p.id})}"
                               class="btn btn-warning btn-sm me-1">Editar clase</a>
                            <form th:action="@{/web/borrar/{id}(id=${p.id})}" method="post"
                                  style="display:inline"
                                  onsubmit="return confirm('¿Borrar esta persona?')">
                                <button type="submit" class="btn btn-danger btn-sm">Borrar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Borrar grupo -->
    <div class="card">
        <div class="card-header">Borrar grupo por rol y clase</div>
        <div class="card-body">
            <form th:action="@{/web/borrar-grupo}" method="post"
                  class="row g-2 align-items-end"
                  onsubmit="return confirm('¿Borrar todas las personas del grupo seleccionado?')">
                <div class="col-md-4">
                    <label class="form-label form-label-sm">Rol</label>
                    <select name="rol" class="form-select form-select-sm" required>
                        <option value="">Selecciona un rol</option>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label form-label-sm">Clase</label>
                    <input type="text" name="classroom" class="form-control form-control-sm"
                           placeholder="Nombre de la clase" required>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-danger btn-sm">Borrar grupo</button>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
